services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env.local
    environment:
      DATABASE_URL: sqlite:///./output/business_plan_writer.db
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_API_KEY: ${BUSINESS_PLAN_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
